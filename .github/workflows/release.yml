name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Uber-jar (platform-independent) ──────────────────────────────────
  uber-jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set version from tag
        run: mvn -B versions:set -DnewVersion="${GITHUB_REF_NAME#v}" -DgenerateBackupPoms=false

      - name: Build uber-jar
        run: mvn -B package

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: uber-jar
          path: target/mcp-email-server-*-runner.jar

  # ── Native images ────────────────────────────────────────────────────
  native:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            suffix: linux-x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
            suffix: linux-aarch64
          - os: macos-latest
            arch: aarch64
            suffix: macos-aarch64
          - os: windows-latest
            arch: x86_64
            suffix: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version from tag (Unix)
        if: runner.os != 'Windows'
        run: mvn -B versions:set -DnewVersion="${GITHUB_REF_NAME#v}" -DgenerateBackupPoms=false

      - name: Set version from tag (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: mvn -B versions:set -DnewVersion="${GITHUB_REF_NAME#v}" -DgenerateBackupPoms=false

      - name: Build native image
        run: mvn -B package -Dnative -DskipTests

      - name: Sanity test native binary (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mvn -B test-compile failsafe:integration-test -Dnative.image.path=target/mcp-email-server-${VERSION}-runner

      - name: Sanity test native binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mvn -B test-compile failsafe:integration-test -Dnative.image.path=target/mcp-email-server-${VERSION}-runner.exe

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv target/mcp-email-server-${VERSION}-runner \
             target/mcp-email-server-${VERSION}-${{ matrix.suffix }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv target/mcp-email-server-${VERSION}-runner.exe \
             target/mcp-email-server-${VERSION}-${{ matrix.suffix }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: native-${{ matrix.suffix }}
          path: |
            target/mcp-email-server-*-${{ matrix.suffix }}
            target/mcp-email-server-*-${{ matrix.suffix }}.exe

  # ── Create GitHub release with all artifacts ─────────────────────────
  release:
    needs: [uber-jar, native]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
