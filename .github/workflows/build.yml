name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn -B package

      - name: Upload uber-jar
        uses: actions/upload-artifact@v4
        with:
          name: mcp-email-server
          path: target/mcp-email-server-*-runner.jar
          retention-days: 14
