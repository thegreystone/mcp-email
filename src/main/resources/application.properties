# =============================================================================
# MCP Email Server Configuration
# =============================================================================
# All values are read from environment variables.
# For Gmail, use an App Password: https://myaccount.google.com/apppasswords
#
# Required env vars:
#   EMAIL_IMAP_HOST, EMAIL_IMAP_USERNAME, EMAIL_IMAP_PASSWORD
#   EMAIL_SMTP_HOST, EMAIL_SMTP_USERNAME, EMAIL_SMTP_PASSWORD
#
# Optional (have sensible defaults):
#   EMAIL_IMAP_PORT (993), EMAIL_IMAP_SSL (true)
#   EMAIL_SMTP_PORT (587), EMAIL_SMTP_STARTTLS (true)

# IMAP (reading, searching, moving emails)
email.imap.host=${EMAIL_IMAP_HOST}
email.imap.port=${EMAIL_IMAP_PORT:993}
email.imap.username=${EMAIL_IMAP_USERNAME}
email.imap.password=${EMAIL_IMAP_PASSWORD}
email.imap.ssl=${EMAIL_IMAP_SSL:true}

# SMTP (sending emails)
email.smtp.host=${EMAIL_SMTP_HOST}
email.smtp.port=${EMAIL_SMTP_PORT:587}
email.smtp.username=${EMAIL_SMTP_USERNAME}
email.smtp.password=${EMAIL_SMTP_PASSWORD}
email.smtp.starttls=${EMAIL_SMTP_STARTTLS:true}

# Logging — keep stdout clean for STDIO transport
quarkus.log.console.enable=false
quarkus.log.file.enable=true
quarkus.log.file.path=mcp-email-server.log

# Uber-jar for easy distribution
quarkus.package.jar.type=uber-jar
