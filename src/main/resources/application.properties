# =============================================================================
# MCP Email Server Configuration — Multi-Account
# =============================================================================
# Accounts are defined entirely through environment variables.
# No account-specific properties are needed here — SmallRye Config automatically
# maps env vars like EMAIL_ACCOUNTS_HOME_IMAP_HOST to email.accounts.home.imap.host.
#
# Example env vars for a "home" account:
#   EMAIL_ACCOUNTS_HOME_IMAP_HOST, EMAIL_ACCOUNTS_HOME_IMAP_USERNAME, ...
#   EMAIL_ACCOUNTS_HOME_SMTP_HOST, EMAIL_ACCOUNTS_HOME_SMTP_USERNAME, ...
#
# Add as many accounts as needed (home, work, gmail, etc.).
# For Gmail, use an App Password: https://myaccount.google.com/apppasswords
#
# Defaults (applied to all accounts via @WithDefault annotations):
#   IMAP port: 993, SSL: true
#   SMTP port: 587, STARTTLS: true

# Logging — keep stdout clean for STDIO transport
quarkus.log.console.enable=false
quarkus.log.file.enable=true
quarkus.log.file.path=mcp-email-server.log

# Uber-jar for easy distribution
quarkus.package.jar.type=uber-jar

# Native image: include Jakarta Mail service providers, config files, and register ServiceLoader classes
quarkus.native.resources.includes=META-INF/services/jakarta.mail.*,META-INF/services/jakarta.activation.*,META-INF/javamail.*,META-INF/mailcap*
quarkus.native.auto-service-loader-registration=true
quarkus.native.additional-build-args=--features=org.eclipse.angus.mail.nativeimage.AngusMailFeature,-Os
